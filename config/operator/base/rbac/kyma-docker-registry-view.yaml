# permissions for end users to view dockerregistry.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
    app.kubernetes.io/name: clusterrole
    app.kubernetes.io/instance: kyma-docker-registry-viewer-role
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: dockerregistry-operator
    app.kubernetes.io/part-of: dockerregistry-operator
    app.kubernetes.io/managed-by: kustomize
    kyma-project.io/module: dockerregistry
  name: kyma-docker-registry-view
rules:
- apiGroups:
  - operator.kyma-project.io
  resources:
  - dockerregistries
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - operator.kyma-project.io
  resources:
  - dockerregistries/status
  verbs:
  - get
